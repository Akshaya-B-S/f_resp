<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DevOps Creative Suite</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #6366f1;
            --bg: #0f172a;
            --glass: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.1);
        }

        body, html {
            margin: 0; padding: 0; height: 100%;
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: var(--bg); color: white; overflow: hidden;
        }

        /* --- DASHBOARD VIEW (PAGE 1) --- */
        #dashboard-view {
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            height: 100vh; background: radial-gradient(circle at top right, #1e1b4b, #0f172a);
            transition: transform 0.8s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .hero-section { text-align: center; margin-bottom: 50px; animation: fadeInDown 0.8s ease; }
        
        .grid { display: grid; grid-template-columns: repeat(2, 280px); gap: 25px; }

        .nav-card {
            background: var(--glass); border: 1px solid var(--glass-border);
            padding: 40px 30px; border-radius: 24px; cursor: pointer;
            text-align: center; transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            backdrop-filter: blur(10px);
        }

        .nav-card:hover {
            transform: translateY(-10px) scale(1.02);
            background: rgba(255, 255, 255, 0.06);
            border-color: var(--primary);
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
        }

        /* --- WHITEBOARD VIEW (PAGE 2) --- */
        #whiteboard-view { 
            position: fixed; top: 0; left: 100%; width: 100%; height: 100vh; 
            display: flex; background: #050810;
            transition: left 0.6s cubic-bezier(0.4, 0, 0.2, 1);
        }

        #sidebar {
            width: 85px; background: var(--glass); border-right: 1px solid var(--glass-border);
            display: flex; flex-direction: column; align-items: center; padding: 20px 0;
            backdrop-filter: blur(20px); z-index: 100;
        }

        .tool-btn {
            width: 50px; height: 50px; margin-bottom: 15px; border-radius: 14px;
            border: 1px solid var(--glass-border); background: transparent;
            color: white; cursor: pointer; transition: 0.3s; font-size: 18px;
        }

        .tool-btn:hover, .tool-btn.active { background: var(--primary); border-color: var(--primary); transform: scale(1.1); }

        #canvas-container { flex-grow: 1; position: relative; }
        canvas { width: 100%; height: 100%; cursor: crosshair; }

        /* Floating Info Panel */
        .status-panel {
            position: absolute; top: 20px; right: 20px; 
            background: var(--glass); padding: 12px 20px; border-radius: 12px;
            border: 1px solid var(--glass-border); font-size: 12px; backdrop-filter: blur(5px);
        }

        /* Logic for Page Switching */
        .show-whiteboard #dashboard-view { transform: translateX(-100%); }
        .show-whiteboard #whiteboard-view { left: 0; }

        @keyframes fadeInDown { from { opacity: 0; transform: translateY(-30px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

<!-- PAGE 1: DASHBOARD -->
<div id="dashboard-view">
    <div class="hero-section">
        <h1>Creative Workspace</h1>
        <p style="color: #94a3b8;">Central Hub for DevOps Visuals</p>
    </div>
    
    <div class="grid">
        <div class="nav-card" onclick="toggleView(true)">
            <div style="font-size: 40px; margin-bottom: 15px;">✨</div>
            <h3>New Whiteboard</h3>
            <p style="font-size: 12px; color: #64748b;">Start a fresh session</p>
        </div>
        <div class="nav-card" onclick="alert('Previous work: AI Disease System, RFID Counter')">
            <div style="font-size: 40px; margin-bottom: 15px;">📂</div>
            <h3>Previous Work</h3>
            <p style="font-size: 12px; color: #64748b;">Review saved assets</p>
        </div>
    </div>
</div>

<!-- PAGE 2: WHITEBOARD SUITE -->
<div id="whiteboard-view">
    <nav id="sidebar">
        <button class="tool-btn active" title="Brush">🖌️</button>
        <button class="tool-btn" title="Shapes" onclick="drawRect()">⬜</button>
        <input type="color" id="colorPicker" value="#6366f1" style="width: 40px; height: 40px; margin-bottom: 15px; cursor: pointer; border: none; background: none;">
        <button class="tool-btn" onclick="addText()" title="Text">T</button>
        <button class="tool-btn" onclick="clearCanvas()" title="Clear">🧹</button>
        <button class="tool-btn" style="margin-top: auto;" onclick="toggleView(false)" title="Exit">🏠</button>
    </nav>

    <div id="canvas-container">
        <div class="status-panel">
            <span style="color: #4ade80;">● Pipeline Active</span><br>
            <span style="color: #94a3b8;">Syncing to GitHub...</span>
        </div>
        <canvas id="mainCanvas"></canvas>
    </div>
</div>

<script>
    const canvas = document.getElementById('mainCanvas');
    const ctx = canvas.getContext('2d');
    let drawing = false;

    // Toggle between Dashboard and Whiteboard
    function toggleView(isWhiteboard) {
        if (isWhiteboard) {
            document.body.classList.add('show-whiteboard');
            setTimeout(resize, 600); // Wait for animation to finish
        } else {
            document.body.classList.remove('show-whiteboard');
        }
    }

    function resize() {
        canvas.width = window.innerWidth - 85;
        canvas.height = window.innerHeight;
    }

    window.addEventListener('resize', resize);

    // Drawing Logic
    canvas.addEventListener('mousedown', () => drawing = true);
    canvas.addEventListener('mouseup', () => { drawing = false; ctx.beginPath(); });
    canvas.addEventListener('mousemove', draw);

    function draw(e) {
        if (!drawing) return;
        ctx.lineWidth = 3;
        ctx.lineCap = 'round';
        ctx.strokeStyle = document.getElementById('colorPicker').value;
        ctx.lineTo(e.clientX - 85, e.clientY);
        ctx.stroke();
        ctx.beginPath();
        ctx.moveTo(e.clientX - 85, e.clientY);
    }

    function drawRect() {
        ctx.strokeStyle = document.getElementById('colorPicker').value;
        ctx.strokeRect(200, 200, 150, 100); // Standard Flow Map shape
    }

    function addText() {
        const text = prompt("Enter text for the note:");
        if (text) {
            ctx.fillStyle = "white";
            ctx.font = "18px Plus Jakarta Sans";
            ctx.fillText(text, 150, 150);
        }
    }

    function clearCanvas() { ctx.clearRect(0, 0, canvas.width, canvas.height); }
</script>
</body>
</html>
