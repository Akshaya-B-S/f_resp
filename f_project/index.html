// Add this inside your <script> tag to "Store" the drawing
function saveToLocalStorage() {
    localStorage.setItem('savedCanvas', canvas.toDataURL());
}

function loadFromLocalStorage() {
    const dataURL = localStorage.getItem('savedCanvas');
    if (dataURL) {
        const img = new Image();
        img.src = dataURL;
        img.onload = () => ctx.drawImage(img, 0, 0);
    }
}

// Call load on startup
loadFromLocalStorage();

// Call saveToLocalStorage() inside the stopDrawing function
function stopDrawing() {
    drawing = false;
    ctx.beginPath();
    saveToLocalStorage(); // Saves every time you lift the mouse
}
