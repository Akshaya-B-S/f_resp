<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DevOps Creative Suite</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #2563eb; --bg: #f8fafc; --sidebar: #ffffff; }
        body { font-family: 'Poppins', sans-serif; margin: 0; display: flex; height: 100vh; background: var(--bg); overflow: hidden; }
        #sidebar { width: 300px; background: var(--sidebar); border-right: 1px solid #e2e8f0; padding: 20px; display: flex; flex-direction: column; z-index: 10; }
        .card { background: #fff; border: 1px solid #e2e8f0; padding: 15px; border-radius: 12px; margin-bottom: 15px; transition: 0.3s; }
        .card:hover { transform: translateY(-5px); box-shadow: 0 10px 20px rgba(0,0,0,0.05); }
        h2 { color: #1e293b; font-size: 20px; }
        h3 { font-size: 14px; margin: 0 0 10px 0; color: #64748b; text-transform: uppercase; }
        button { background: var(--primary); color: white; border: none; padding: 12px; border-radius: 8px; cursor: pointer; width: 100%; font-weight: 600; transition: 0.2s; }
        button:hover { background: #1d4ed8; }
        #canvas-container { flex-grow: 1; position: relative; background: #fff; }
        canvas { width: 100%; height: 100%; touch-action: none; }
        .toolbar { position: absolute; top: 20px; left: 50%; transform: translateX(-50%); background: white; padding: 10px 20px; border-radius: 50px; display: flex; gap: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); align-items: center; z-index: 20; }
        .animate-in { animation: slideUp 0.6s ease-out; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

<div id="sidebar">
    <h2 class="animate-in">Project Dashboard</h2>
    <div class="card animate-in">
        <h3>History</h3>
        <p style="font-size: 13px;">• AI Disease System<br>• RFID Vehicle Counter</p>
    </div>
    <div class="card animate-in">
        <h3>Actions</h3>
        <button onclick="clearCanvas()">Clear Board</button>
    </div>
    <div class="card animate-in" style="margin-top: auto; background: #f0fdf4; border-color: #bbf7d0;">
        <h3 style="color: #166534;">DevOps Status</h3>
        <p style="font-size: 12px; color: #166534;">✔ GitHub Pipeline Active</p>
    </div>
</div>

<div id="canvas-container">
    <div class="toolbar animate-in">
        <input type="color" id="colorPicker" value="#2563eb">
        <select id="tool">
            <option value="brush">Mind Map Brush</option>
            <option value="line">Flow Line</option>
        </select>
        <span id="status" style="font-size: 12px; color: #94a3b8;">Drawing...</span>
    </div>
    <canvas id="whiteboard"></canvas>
</div>

<script>
    const canvas = document.getElementById('whiteboard');
    const ctx = canvas.getContext('2d');
    let drawing = false;

    function init() {
        canvas.width = window.innerWidth - 300;
        canvas.height = window.innerHeight;
    }
    window.addEventListener('resize', init);
    init();

    canvas.addEventListener('mousedown', () => drawing = true);
    canvas.addEventListener('mouseup', () => { drawing = false; ctx.beginPath(); });
    canvas.addEventListener('mousemove', draw);

    function draw(e) {
        if (!drawing) return;
        ctx.lineWidth = 4;
        ctx.lineCap = 'round';
        ctx.strokeStyle = document.getElementById('colorPicker').value;
        ctx.lineTo(e.clientX - 300, e.clientY);
        ctx.stroke();
        ctx.beginPath();
        ctx.moveTo(e.clientX - 300, e.clientY);
    }
    function clearCanvas() { ctx.clearRect(0, 0, canvas.width, canvas.height); }
</script>
</body>
</html>
