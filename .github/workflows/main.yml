name: DevOps Pipeline
on: [push]

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
      
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      # This step tells Maven to look inside your f_project folder for the pom.xml
      - name: Build and Test with Maven
        run: mvn -B package --file f_project/pom.xml

  deploy-dashboard:
    needs: build-and-test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
      
      - name: Setup Pages
        uses: actions/configure-pages@v4
        
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # This ensures only the contents of f_project (like index.html) are deployed
          path: 'f_project/'
          
      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4
